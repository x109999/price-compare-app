<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时零售比价工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 页面 1: 欢迎页 -->
        <div id="welcome-page" class="page active">
            <div class="welcome-content">
                <div class="logo">
                    <div class="logo-icon">🔍</div>
                    <h1>即时零售比价工具</h1>
                </div>
                <p class="tagline">智能比价 · 省钱省心</p>
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">📦</div>
                        <span>自动抓取历史订单</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🏭</div>
                        <span>1688 源头工厂比价</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💰</div>
                        <span>智能推荐低价好物</span>
                    </div>
                </div>
                <button id="start-btn" class="primary-btn">开始使用</button>
            </div>
        </div>

        <!-- 页面 2: 扫码登录页 -->
        <div id="login-page" class="page">
            <div class="login-content">
                <h2>扫码登录</h2>
                <p class="login-hint">请使用淘宝/1688 APP 扫码授权</p>
                <div class="qr-container">
                    <div id="qr-code" class="qr-code">
                        <!-- 二维码将通过 JS 动态生成 -->
                        <div class="qr-placeholder">
                            <div class="qr-loading">
                                <div class="spinner"></div>
                                <p>生成二维码中...</p>
                            </div>
                        </div>
                    </div>
                    <div class="qr-tips">
                        <p>⏱️ 二维码 5 分钟内有效</p>
                        <p>🔒 安全授权，仅用于比价</p>
                    </div>
                </div>
                <button id="refresh-qr-btn" class="secondary-btn">刷新二维码</button>
                <button id="cancel-login-btn" class="text-btn">取消</button>
            </div>
        </div>

        <!-- 页面 3: 比价进行中页 -->
        <div id="processing-page" class="page">
            <div class="processing-content">
                <div class="user-info">
                    <div class="avatar">👤</div>
                    <span id="user-name">用户</span>
                </div>
                <h2>比价进行中</h2>
                <div class="progress-container">
                    <div class="progress-steps">
                        <div class="step active" id="step-1">
                            <div class="step-icon">📥</div>
                            <div class="step-label">抓取订单</div>
                            <div class="step-status">进行中...</div>
                        </div>
                        <div class="step" id="step-2">
                            <div class="step-icon">🔍</div>
                            <div class="step-label">1688 比价</div>
                            <div class="step-status">等待中</div>
                        </div>
                        <div class="step" id="step-3">
                            <div class="step-icon">✅</div>
                            <div class="step-label">生成报告</div>
                            <div class="step-status">等待中</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progress-text">正在分析您的订单...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>
                <div class="stats-preview">
                    <div class="stat-item">
                        <div class="stat-value" id="orders-count">0</div>
                        <div class="stat-label">已分析订单</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="potential-savings">¥0</div>
                        <div class="stat-label">预计节省</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面 4: 比价结果页 -->
        <div id="result-page" class="page">
            <div class="result-content">
                <div class="result-header">
                    <h2>🎉 比价完成！</h2>
                    <p class="result-subtitle">已为您找到 <span id="deals-count" class="highlight">0</span> 个更优选择</p>
                </div>
                <div class="summary-cards">
                    <div class="summary-card">
                        <div class="summary-icon">💰</div>
                        <div class="summary-value" id="total-savings">¥0</div>
                        <div class="summary-label">总共可节省</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-icon">📦</div>
                        <div class="summary-value" id="items-found">0</div>
                        <div class="summary-label">找到同款商品</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-icon">📉</div>
                        <div class="summary-value" id="avg-discount">0%</div>
                        <div class="summary-label">平均折扣</div>
                    </div>
                </div>
                <div class="results-section">
                    <h3>推荐商品</h3>
                    <div id="deals-list" class="deals-list">
                        <!-- 商品列表将通过 JS 动态生成 -->
                    </div>
                </div>
                <div class="result-actions">
                    <button id="export-btn" class="secondary-btn">导出报告</button>
                    <button id="new-compare-btn" class="primary-btn">重新比价</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
